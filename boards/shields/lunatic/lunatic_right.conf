CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_EXT_POWER=y

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=25000
CONFIG_ZMK_INSOMNIA_PING_INTERVAL=10000
CONFIG_ZMK_INSOMNIA_PING_ON_START=y

CONFIG_PMW3610=y

CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_Y=y
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_INVERT_SCROLL_X=n
CONFIG_PMW3610_INVERT_SCROLL_Y=y

CONFIG_PMW3610_CPI=3200
CONFIG_PMW3610_CPI_DIVIDOR=4
CONFIG_PMW3610_SNIPE_CPI=1200
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=4

CONFIG_PMW3610_SCROLL_TICK=150

CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_SMART_ALGORITHM=y

# Mouse HID tuning
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=30
CONFIG_ZMK_HID_SEPARATE_MOD_RELEASE_REPORT=y

# Split battery reporting (central fetches from peripheral)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Faster BLE connection for better mouse performance
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=400

# BLE Mouse/Pointing support
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y